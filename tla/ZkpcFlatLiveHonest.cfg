\* C3 liveness, honest member only (rev-9 mc20 default): an honest closer
\* settles its exact floor; accepted tickets settle to the gateway.
\* Per-member properties; the pool (the only cross-member coupling) is not
\* referenced by any temporal property, so MEMBERS=1 scopes suffice.
CONSTANTS
  Members = {a}
  Byz = {}
  C = 1
  D = 2
  B = 2
  MaxEpoch = 1
  CloseMode = "mc20"
SPECIFICATION LiveSpec
INVARIANTS
  TypeOK
PROPERTIES
  HonestCloseSettles
  SweepSettles
